# MCP tool ↔ kaggle CLI command mapping.
#
# Each MCP tool advertised by Kaggle.Sdk/mcp/McpClient.cs MUST appear here.
# The value is either:
#   - a kaggle CLI command path (e.g. "hackathons writeups download"), which
#     must match a registered argparse subcommand chain, OR
#   - "skip: <reason>" — skip the parity check for tools that have no CLI
#     surface (browser-only flows, internal RPCs, or work-in-progress).
#
# Adding a new MCP tool? `tools/check_mcp_cli_parity.py` will fail with
# "MISSING" until you add a row here. See `tools/README.md` for details.

# ── auth / browser-only ─────────────────────────────────────────────────
authorize: "skip: browser-based OAuth, exposed via `kaggle auth login`"

